name: Deploy to Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_STORYBLOK_ACCESS_TOKEN: ${{ secrets.VITE_STORYBLOK_ACCESS_TOKEN }}
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.BEGET_SSH_KEY_B64 }}" ]; then
            echo "${{ secrets.BEGET_SSH_KEY_B64 }}" | base64 -d | tr -d '\r' > ~/.ssh/id_ed25519
          else
            printf '%s' "${{ secrets.BEGET_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -p "${{ secrets.BEGET_SSH_PORT }}" "${{ secrets.BEGET_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify SSH auth
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.BEGET_SSH_PORT }}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}" \
            "echo SSH_OK && whoami"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.BEGET_SSH_PORT }} -o IdentitiesOnly=yes" \
            dist/ \
            "${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}"
